<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>连接测试</title>
<style>body{font-family:-apple-system,sans-serif;padding:20px;background:#faf8f4;color:#3a3835;line-height:1.8}.ok{color:#4a7c59}.fail{color:#c44}</style></head><body>
<h2>连接测试</h2>
<p id="s1">⏳ 测试读取...</p>
<p id="s2">⏳ 测试写入...</p>
<script>
const KEY='$2a$10$LaFzu8ik4tTzNy35YLBF1OcoTogoIbWJUQ4/SpkQ.0M3UUhjGeyRO';
const BIN='6a453823f5f4af5e294e5db2';
const H={'X-Master-Key':KEY,'Content-Type':'application/json'};
(async()=>{
try{
const r1=await fetch('https://api.jsonbin.io/v3/b/'+BIN+'/latest',{headers:H});
if(r1.ok){document.getElementById('s1').innerHTML='✅ 读取成功 ('+r1.status+')';document.getElementById('s1').className='ok';}
else{document.getElementById('s1').innerHTML='❌ 读取失败 HTTP '+r1.status;document.getElementById('s1').className='fail';}
}catch(e){document.getElementById('s1').innerHTML='❌ 读取错误: '+e.message;document.getElementById('s1').className='fail';}
try{
const r2=await fetch('https://api.jsonbin.io/v3/b/'+BIN,{method:'PUT',headers:H,body:'{"records":[{"id":"diag","date":"2026-07-01","name":"test","breakfast":"test"}]}'});
if(r2.ok){document.getElementById('s2').innerHTML='✅ 写入成功 ('+r2.status+')';document.getElementById('s2').className='ok';}
else{document.getElementById('s2').innerHTML='❌ 写入失败 HTTP '+r2.status;document.getElementById('s2').className='fail';}
}catch(e){document.getElementById('s2').innerHTML='❌ 写入错误: '+e.message;document.getElementById('s2').className='fail';}
})();
</script></body></html>
